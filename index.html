<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusScaffold // Elite Command Deck</title>
    <style>
        :root {
            --bg-dark: #070709;
            --panel-bg: #111115;
            --panel-bg-elevated: #181820;
            --panel-border: #2a2a35;
            --text-primary: #ffffff;
            --text-secondary: #a1a1b2;
            
            --accent-blue: #38bdf8;
            --accent-blue-glow: rgba(56, 189, 248, 0.15);
            --accent-green: #4ade80;
            --accent-green-glow: rgba(74, 222, 128, 0.2);
            --accent-amber: #fbbf24;
            --accent-amber-glow: rgba(251, 191, 36, 0.25);
            --accent-rose: #f43f5e;
            
            --radius-lg: 16px;
            --radius-md: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(90deg, var(--panel-bg) 0%, #161622 100%);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-md);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .brand-zone h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #fff, var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-zone span {
            font-weight: 300;
            font-size: 13px;
            color: var(--accent-blue);
        }

        .system-badge {
            background: var(--accent-blue-glow);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .dashboard-grid {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            flex: 1;
            width: 100%;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            flex: 1 1 300px;
            min-height: 400px;
        }

        .col-left { flex: 1 1 320px; max-width: 400px; }
        .col-center { flex: 2 1 400px; }
        .col-right { flex: 1 1 360px; max-width: 460px; }

        @media (max-width: 1024px) {
            .col-left, .col-right { max-width: 100%; }
            body { overflow-y: auto; }
            .panel { min-height: auto; }
        }

        .panel-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--panel-border);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ifthen-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ifthen-row div {
            flex: 1;
        }

        label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        input[type="text"] {
            width: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            padding: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-blue);
            background-color: var(--panel-bg-elevated);
            box-shadow: 0 0 8px var(--accent-blue-glow);
        }

        .center-arena {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            background: radial-gradient(circle at top, #161a2e 0%, var(--panel-bg) 70%);
        }

        .now-playing-meta {
            width: 100%;
            max-width: 550px;
        }

        .now-playing-meta h2 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .active-scaffold-text {
            font-size: 16px;
            color: var(--text-secondary);
            font-style: italic;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 12px 20px;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
        }

        .timer-active-emphasis {
            font-size: 22px !important;
            color: var(--bg-dark) !important;
            background-color: var(--accent-amber) !important;
            border-color: var(--accent-amber);
            font-weight: 700 !important;
            font-style: normal !important;
            box-shadow: 0 4px 20px rgba(251, 191, 36, 0.3);
        }

        .active-shield-text {
            font-size: 14px;
            color: var(--accent-blue);
            margin-top: 12px;
            font-weight: 500;
        }

        .giant-clock {
            font-size: clamp(60px, 12vw, 115px);
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            letter-spacing: -3px;
            line-height: 1;
            margin: 24px 0;
        }

        .clock-running {
            color: var(--accent-green);
            text-shadow: 0 0 35px var(--accent-green-glow);
        }

        .playback-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn {
            font-size: 14px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn:hover { transform: translateY(-1px); }

        .btn-primary {
            background-color: var(--text-primary);
            color: var(--bg-dark);
            padding: 16px 44px;
            font-size: 16px;
        }

        .btn-primary-running {
            background-color: var(--accent-rose) !important;
            color: white !important;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--panel-border);
            color: var(--text-secondary);
            padding: 14px 28px;
        }

        .btn-secondary:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }

        .vertical-queue {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .queue-card {
            background: linear-gradient(145deg, var(--panel-bg-elevated) 0%, #1c1c24 100%);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
            position: relative;
        }

        .queue-card:hover {
            border-color: var(--accent-blue);
        }

        .card-play-btn {
            background: var(--accent-green);
            color: var(--bg-dark);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            border: none;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(74, 222, 128, 0.2);
            transition: transform 0.2s;
        }

        .card-play-btn:hover {
            transform: scale(1.08);
            background: #22c55e;
        }

        .card-main-content {
            flex-grow: 1;
            overflow: hidden;
        }

        .queue-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .queue-card-meta {
            font-size: 12px;
            line-height: 1.4;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 4px;
        }
        
        .meta-step {
            background-color: rgba(251, 191, 36, 0.08);
            color: var(--accent-amber);
            border-left: 2px solid var(--accent-amber);
        }

        .meta-shield-block {
            background-color: rgba(56, 189, 248, 0.06);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #ffffff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 6px;
        }

        .shield-label {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            display: inline-block;
            margin-right: 4px;
        }

        .card-right-controls {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }

        .rank-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            padding: 2px;
        }

        .rank-btn:hover { color: white; }

        .queue-card-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 8px;
        }

        .action-button {
            background: none;
            border: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .complete-link { color: var(--accent-green); }
        .delete-link { color: var(--accent-rose); }
        .redo-link { color: var(--accent-blue); }

        /* Render Fix for Circular Return Arrow Icon */
        .icon-rewind {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--accent-blue);
            border-top-color: transparent;
            border-radius: 50%;
            position: relative;
            transform: rotate(-45deg);
            margin-right: 2px;
        }

        .icon-rewind::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -2px;
            border: 3px solid transparent;
            border-bottom-color: var(--accent-blue);
            transform: rotate(45deg);
        }

        .reservoir-section {
            border-top: 1px dashed var(--panel-border);
            margin-top: auto;
            padding-top: 16px;
        }

        .reservoir-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent-green);
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reservoir-card {
            background-color: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            opacity: 0.65;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="brand-zone">
            <h1>FocusScaffold <span>// Command Deck Pro</span></h1>
        </div>
        <div class="system-badge">ADHD Behavioral Tool Kit System</div>
    </header>

    <div class="dashboard-grid">
        
        <div class="panel col-left">
            <div class="panel-header" style="color: var(--accent-blue);">1. Drop Deposit</div>
            <div class="panel-body">
                <div class="form-group">
                    <label for="task-title">Target Goal Focus</label>
                    <input type="text" id="task-title" placeholder="e.g., File expense report sheets">
                </div>

                <div class="form-group">
                    <label for="task-scaffold">Microbehavioral Entry Step</label>
                    <input type="text" id="task-scaffold" placeholder="e.g., Locate receipt files & open sheet tab">
                </div>

                <div class="form-group">
                    <label>Conditional Shield Strategy</label>
                    <div class="ifthen-row">
                        <div>
                            <input type="text" id="shield-if" placeholder="IF... (e.g., my phone buzzes)">
                        </div>
                        <div>
                            <input type="text" id="shield-then" placeholder="THEN... (e.g., toss it onto the bed)">
                        </div>
                    </div>
                </div>

                <button class="btn btn-secondary" style="background-color: var(--text-primary); color: var(--bg-dark); border: none; border-radius: var(--radius-md); padding: 14px; font-size:14px;" onclick="addNewTask()">
                    + Queue Sprint Track
                </button>
            </div>
        </div>

        <div class="panel col-center center-arena">
            <div class="now-playing-meta">
                <div style="font-size: 11px; text-transform: uppercase; color: var(--accent-blue); font-weight: 800; letter-spacing: 1.5px; margin-bottom: 8px;">
                    • Now Playing Focus Target
                </div>
                <h2 id="active-focus-title">No Objective Staged</h2>
                <div id="active-focus-scaffold" class="active-scaffold-text">
                    Select a target sprint milestone from your playlist to activate tracking layouts.
                </div>
                <div id="active-focus-shield" class="active-shield-text"></div>
            </div>

            <div class="giant-clock" id="timer-display">10:00</div>

            <div class="playback-controls">
                <button class="btn btn-secondary" onclick="resetTimer()">Reset Deck</button>
                <button class="btn btn-primary" id="btn-timer-toggle" onclick="toggleTimer()">Start Sprint</button>
            </div>
        </div>

        <div class="panel col-right">
            <div class="panel-header">
                <span>2. Track Up Next</span>
                <span id="queue-count" style="font-size:11px; color: var(--accent-blue); background: var(--panel-bg-elevated); padding: 2px 8px; border-radius:10px;">0</span>
            </div>
            
            <div class="panel-body" style="justify-content: flex-start; gap: 24px;">
                
                <div class="vertical-queue" id="tasks-pending-container">
                    </div>

                <div class="reservoir-section">
                    <div class="reservoir-title">
                        <span>🛡️ Reservoir of Faith</span>
                        <span style="font-size:10px; font-weight:normal; color:var(--text-secondary);">(Your Proof of Competence)</span>
                    </div>
                    <div class="vertical-queue" id="tasks-completed-container">
                        </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('focus_scaffold_pro_tasks')) || [];
        let timerInterval = null;
        let timeRemaining = 600; 
        let isTimerRunning = false;

        function addNewTask() {
            const titleInput = document.getElementById('task-title');
            const scaffoldInput = document.getElementById('task-scaffold');
            const ifInput = document.getElementById('shield-if');
            const thenInput = document.getElementById('shield-then');

            if (!titleInput.value.trim()) {
                alert("Please declare an explicit core sprint milestone.");
                return;
            }

            const task = {
                id: Date.now(),
                title: titleInput.value.trim(),
                scaffold: scaffoldInput.value.trim() || "Initiate base operations visualization",
                shieldIf: ifInput.value.trim() || "distractions attempt entry",
                shieldThen: thenInput.value.trim() || "re-align eyes instantly to center timer",
                completed: false
            };

            tasks.push(task);
            saveAndRefresh();
            
            titleInput.value = '';
            scaffoldInput.value = '';
            ifInput.value = '';
            thenInput.value = '';
        }

        function renderTasks() {
            const pendingContainer = document.getElementById('tasks-pending-container');
            const completedContainer = document.getElementById('tasks-completed-container');
            const countBadge = document.getElementById('queue-count');
            
            pendingContainer.innerHTML = '';
            completedContainer.innerHTML = '';

            const pendingTasks = tasks.filter(t => !t.completed);
            const completedTasks = tasks.filter(t => t.completed);

            countBadge.innerText = pendingTasks.length;

            if (pendingTasks.length === 0) {
                pendingContainer.innerHTML = `<div style="text-align: center; color: var(--text-secondary); font-size: 13px; padding: 20px; border: 1px dashed var(--panel-border); border-radius: var(--radius-md);">Playlist empty. Build a behavioral deposit map to begin.</div>`;
            } else {
                pendingTasks.forEach((task) => {
                    const card = document.createElement('div');
                    card.className = 'queue-card';
                    card.innerHTML = `
                        <button class="card-play-btn" onclick="playTaskImmediately(${task.id})">▶</button>
                        <div class="card-main-content">
                            <div class="queue-card-title">${task.title}</div>
                            <div class="queue-card-meta meta-step">🔬 Step: ${task.scaffold}</div>
                            
                            <div class="meta-shield-block">
                                <div><span class="shield-label" style="color:var(--accent-rose)">IF</span> ${task.shieldIf}</div>
                                <div style="margin-top: 2px;"><span class="shield-label" style="color:var(--accent-green)">THEN</span> ${task.shieldThen}</div>
                            </div>

                            <div class="queue-card-actions">
                                <button class="action-button complete-link" onclick="markTaskCompletion(${task.id}, true)">✓ Complete</button>
                                <button class="action-button delete-link" onclick="deleteTask(${task.id})">🗑 Drop</button>
                            </div>
                        </div>
                        
                        <div class="card-right-controls">
                            <button class="rank-btn" onclick="changePriority(${task.id}, -1)">▲</button>
                            <button class="rank-btn" onclick="changePriority(${task.id}, 1)">▼</button>
                        </div>
                    `;
                    pendingContainer.appendChild(card);
                });
            }

            if (completedTasks.length === 0) {
                completedContainer.innerHTML = `<div style="text-align: center; color: var(--text-secondary); font-size: 11px; padding: 12px; border: 1px dashed rgba(255,255,255,0.05);">No documented wins yet inside this workspace session. Complete a sprint loop to compile faith.</div>`;
            } else {
                completedTasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'queue-card reservoir-card';
                    card.innerHTML = `
                        <div class="card-main-content">
                            <div class="queue-card-title" style="text-decoration: line-through; color: var(--text-secondary);">${task.title}</div>
                            <div class="queue-card-actions" style="margin-top: 4px; padding-top: 4px; border:none;">
                                <button class="action-button redo-link" onclick="markTaskCompletion(${task.id}, false)">
                                    <span class="icon-rewind"></span> Rewind Task
                                </button>
                                <button class="action-button delete-link" onclick="deleteTask(${task.id})">🗑 Purge</button>
                            </div>
                        </div>
                    `;
                    completedContainer.appendChild(card);
                });
            }
        }

        function changePriority(id, direction) {
            const index = tasks.findIndex(t => t.id === id);
            if (index === -1) return;
            
            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= tasks.length) return;

            if (tasks[index].completed === tasks[targetIndex].completed) {
                const temp = tasks[index];
                tasks[index] = tasks[targetIndex];
                tasks[targetIndex] = temp;
                saveAndRefresh();
            }
        }

        function markTaskCompletion(id, isComplete) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = isComplete;
                saveAndRefresh();
                
                if (isComplete && document.getElementById('active-focus-title').innerText === task.title) {
                    clearActiveArenaDisplay();
                }
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('focus_scaffold_pro_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        // Feature upgrade: Injects metadata AND force activates the execution loop
        function playTaskImmediately(id) {
            const target = tasks.find(t => t.id === id);
            if (!target) return;

            // 1. Map values into viewport
            document.getElementById('active-focus-title').innerText = target.title;
            
            const scaffoldElement = document.getElementById('active-focus-scaffold');
            scaffoldElement.innerText = `Immediate Action Step: ${target.scaffold}`;
            
            document.getElementById('active-focus-shield').innerHTML = `
                <span style="color:var(--accent-rose); font-weight:700;">IF</span> ${target.shieldIf} 
                <span style="color:var(--accent-green); font-weight:700; margin-left:8px;">THEN</span> ${target.shieldThen}
            `;
            
            // 2. Clear out existing clock run intervals safely
            clearInterval(timerInterval);
            timeRemaining = 600;
            isTimerRunning = false;
            
            // 3. Trigger playback autostart sequence immediately
            startTimerExecutionLoop();
        }

        function startTimerExecutionLoop() {
            const btn = document.getElementById('btn-timer-toggle');
            const clock = document.getElementById('timer-display');
            const scaffoldText = document.getElementById('active-focus-scaffold');

            isTimerRunning = true;
            btn.innerText = "Pause Session";
            btn.classList.add('btn-primary-running');
            clock.classList.add('clock-running');
            scaffoldText.classList.add('timer-active-emphasis');
            
            updateTimerUI();

            timerInterval = setInterval(() => {
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("Time complete! You met your active 10-minute commitment. Continue forward or wrap up guilt-free!");
                    resetTimer();
                } else {
                    timeRemaining--;
                    updateTimerUI();
                }
            }, 1000);
        }

        function clearActiveArenaDisplay() {
            document.getElementById('active-focus-title').innerText = "No Objective Staged";
            document.getElementById('active-focus-scaffold').innerText = "Select a target sprint milestone from your playlist to activate tracking layouts.";
            document.getElementById('active-focus-scaffold').className = "active-scaffold-text";
            document.getElementById('active-focus-shield').innerHTML = "";
            resetTimer();
        }

        function toggleTimer() {
            if (isTimerRunning) {
                // If clicked while running, handle explicit pause request cleanly
                clearInterval(timerInterval);
                const btn = document.getElementById('btn-timer-toggle');
                const clock = document.getElementById('timer-display');
                const scaffoldText = document.getElementById('active-focus-scaffold');

                btn.innerText = "Resume Sprint";
                btn.classList.remove('btn-primary-running');
                clock.classList.remove('clock-running');
                scaffoldText.classList.remove('timer-active-emphasis');
                isTimerRunning = false;
            } else {
                // Ensure there is actually a valid task context before manual bypass trigger clicks
                if (document.getElementById('active-focus-title').innerText === "No Objective Staged") {
                    alert("Staging notice: Please select and play a target task track from your queue list first.");
                    return;
                }
                startTimerExecutionLoop();
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeRemaining = 600;
            isTimerRunning = false;
            updateTimerUI();
            
            const btn = document.getElementById('btn-timer-toggle');
            btn.innerText = "Start Sprint";
            btn.classList.remove('btn-primary-running');
            
            document.getElementById('timer-display').classList.remove('clock-running');
            const scaffoldText = document.getElementById('active-focus-scaffold');
            if(scaffoldText) scaffoldText.classList.remove('timer-active-emphasis');
        }

        function updateTimerUI() {
            const mins = Math.floor(timeRemaining / 60);
            const secs = timeRemaining % 60;
            document.getElementById('timer-display').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        renderTasks();
    </script>
</body>
</html>
